            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* ТАЙМЕР - СДЕЛАЛИ СТРОГО В РЯД */
        .timer-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0 40px;
        }

        .timer-box {
            display: flex;
            flex-direction: column;
            min-width: 70px;
        }

        .timer-num {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: #d4af37;
            line-height: 1;
        }

        .timer-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-top: 5px;
        }

        /* КНОПКА */
        .gold-btn {
            display: inline-block;
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            color: #000;
            padding: 18px 40px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .gold-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5);
        }

        /* ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 600px) {
            .timer-row { gap: 10px; }
            .timer-box { min-width: 50px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <div class="logo-text">EAGI Oscar 2026</div>
            <h1>ГЛАВНАЯ НОЧЬ</h1>
            <p style="letter-spacing: 2px; font-weight: 300; opacity: 0.8;">13 МАЯ | АСТАНА</p>
            
            <!-- Исправленный ряд таймера -->
            <div class="timer-row">
                <div class="timer-box">
                    <span class="timer-num" id="d">00</span>
                    <span class="timer-label">дней</span>
                </div>
                <div class="timer-box">
                    <span class="timer-num" id="h">00</span>
                    <span class="timer-label">часов</span>
                </div>
                <div class="timer-box">
                    <span class="timer-num" id="m">00</span>
                    <span class="timer-label">минут</span>
                </div>
            </div>

            <a href="#apply" class="gold-btn">Занять своё место</a>
        </div>
    </section>

    <!-- Секция анкеты (упрощенная для примера) -->
    <section id="apply" style="padding: 80px 20px; text-align: center; background: #0a0a0a;">
        <h2 style="font-family: 'Cinzel'; color: #d4af37; margin-bottom: 30px;">Подать заявку</h2>
        <p style="color: #666;">Форма регистрации и другие блоки находятся ниже...</p>
        <!-- Сюда вставь форму из предыдущего кода, если нужно -->
    </section>

    <script>
        // Код таймера
        const finishDate = new Date("May 13, 2026 18:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = finishDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById("d").innerText = days;
            document.getElementById("h").innerText = hours;
            document.getElementById("m").innerText = minutes;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
